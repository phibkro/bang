name = "bang-lang"
defaultTargets = ["Bang"]

[[lean_lib]]
name = "Bang"
# Build EVERY `Bang/**/*.lean` directly — no hand-maintained import barrel.
# `Bang.+` is lake's `submodules` glob (all submodules of `Bang`, recursively,
# but not a `Bang.lean` root — there is none). This makes the default `lake build`
# (= the gate) the build closure: a new module, or a witness/refutation file, is
# compiled by the gate the moment it lands — no "out-of-closure" coverage gap
# (#81). `tools/check-all-modules.sh` enforces the module-header policy on the
# same set. Replaces the former `Bang.lean` barrel (retired; nobody imports it).
globs = ["Bang.+"]

# Mathlib gives us the Finset semilattice. The rev MUST match lean-toolchain:
# the simplest reliable pin is to pick a Mathlib release tag and set
# lean-toolchain to the Lean version THAT TAG uses (read its own lean-toolchain).
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0"

# Loogle (Mathlib type-signature search) is deliberately NOT a build dependency. It was a
# dev-only tool (`lake exe loogle`), NEVER imported by `Bang`, but as a `[[require]]` lake
# resolved + checked-out its tree on every build — and its re-clone repeatedly clobbered
# worktree git state (task #19: loogle's untracked `frontend-tests/*.py` abort lake's
# checkout, which then triggered a clobbering re-clone of the shared store). Removed at the
# root (removal doesn't fetch, so it can't trigger the hazard). `just loogle` now hits the
# web service (loogle.lean-lang.org); agents use the `lean_loogle` MCP tool. Re-add ONLY if
# a Bang module ever imports Loogle (it does not) — then pin a tag, not `master`.
